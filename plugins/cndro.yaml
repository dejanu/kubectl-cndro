apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cndro
spec:
  version: v0.1.3
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.3/kubectl-cndro_v0.1.3_linux_amd64.tar.gz
