        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.3/kubectl-cndro_v0.1.3_darwin_amd64.tar.gz
      sha256: ae8793ff5dd28e7ddb395be4170039928cc09b8c12ebcd83a551819ba5d7fb63
