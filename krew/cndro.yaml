        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.1/kubectl-cndro_v0.1.1_darwin_arm64.tar.gz
      sha256: 63fd665d98b784deaf25e5d6937ba4e02b1aef7c958e53734d3b573cb2930d67
      files:
        - from: "./kubectl-cndro"
          to: "."
        - from: LICENSE
          to: "."
