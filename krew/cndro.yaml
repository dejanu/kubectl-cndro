apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cndro
spec:
  version: v0.1.2
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.2/kubectl-cndro_v0.1.2_linux_amd64.tar.gz
      sha256: 397c8bde446a178fa13b8e3088d94f66b1b72f65f87e771e58602b6fe0f70c08
      files:
        - from: "./kubectl-cndro"
          to: "."
        - from: LICENSE
          to: "."
      bin: kubectl-cndro
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.2/kubectl-cndro_v0.1.2_linux_arm64.tar.gz
      sha256: 8a1f9eec2d88d612a2566ee481cabfde00c47498f06d955d3be74e064f7aa092
      files:
        - from: "./kubectl-cndro"
          to: "."
        - from: LICENSE
          to: "."
      bin: kubectl-cndro
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.2/kubectl-cndro_v0.1.2_darwin_amd64.tar.gz
      sha256: 4de9e2df598b5bf579a48bdfab993a9e2382f2581bec2fdd822755ac66fca86f
      files:
        - from: "./kubectl-cndro"
          to: "."
        - from: LICENSE
          to: "."
      bin: kubectl-cndro
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.2/kubectl-cndro_v0.1.2_darwin_arm64.tar.gz
      sha256: 36b2bea932add637dbda9b2ca91ba69c1f5a5b98f1fd0e9cdd1137d54f70a2c0
      files:
        - from: "./kubectl-cndro"
          to: "."
        - from: LICENSE
          to: "."
      bin: kubectl-cndro
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.2/kubectl-cndro_v0.1.2_windows_amd64.zip
      sha256: 47a950c0384a6e0ff16add17b92632b421671cde77a6391c504127ab86732f70
      files:
        - from: "kubectl-cndro.exe"
          to: "."
        - from: LICENSE
          to: "."
      bin: kubectl-cndro.exe
  shortDescription: Cloud Native Days Romania schedules and tickets
  homepage: https://github.com/dejanu/kubectl-cndro
  caveats: |
    Usage:
      kubectl cndro -h
      kubectl cndro day1
      kubectl cndro day2
      kubectl cndro tickets

    See https://github.com/dejanu/kubectl-cndro/blob/main/Readme.md
  description: |
    kubectl plugin for Cloud Native Days Romania (CNDRO): conference schedules
    (sessions and workshops), tickets URL with optional browser open, and pricing.
