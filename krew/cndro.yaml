      files:
        - from: "kubectl-cndro.exe"
          to: "."
        - from: LICENSE
          to: "."
      bin: kubectl-cndro.exe
  shortDescription: Cloud Native Days Romania schedules and tickets
  homepage: https://github.com/dejanu/kubectl-cndro
  caveats: |
    Usage:
      kubectl cndro -h
      kubectl cndro day1
      kubectl cndro day2
      kubectl cndro tickets

    See https://github.com/dejanu/kubectl-cndro/blob/main/Readme.md
  description: |
    kubectl plugin for Cloud Native Days Romania (CNDRO): conference schedules
    (sessions and workshops), tickets URL with optional browser open, and pricing.
