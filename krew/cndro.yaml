    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.1/kubectl-cndro_v0.1.1_darwin_amd64.tar.gz
      sha256: 4136e8aab7a2b8ca6a248c47887d17dacbb56add446e7ff3156aa74b75adba0c
      files:
        - from: "./kubectl-cndro"
          to: "."
        - from: LICENSE
          to: "."
