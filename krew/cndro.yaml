    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/dejanu/kubectl-cndro/releases/download/v0.1.1/kubectl-cndro_v0.1.1_darwin_amd64.tar.gz
      sha256: 32d428ca3f30b5ed2a63cd2e6556c8b403a599a76b560cf519c1f5b8268b5586
