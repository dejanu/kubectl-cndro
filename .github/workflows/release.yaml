# Build multi-arch release archives, update Krew manifests, commit them back to main,
# and attach archives to a GitHub Release — all triggered by pushing a v* tag.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Package archives and update manifests
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          chmod +x scripts/package-krew-release.sh
          ./scripts/package-krew-release.sh

      - name: Commit and push updated manifests
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add plugins/cndro.yaml krew/cndro.yaml
          git diff --cached --quiet || git commit -m "chore: bump Krew manifests to ${VERSION}"
          git push origin main

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/krew/${{ github.ref_name }}/*
          generate_release_notes: true
